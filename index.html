<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de IPS · Pleno Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
    <style>
        :root { --bg:#0e1117; --card:#161b25; --input:#1c2333; --border:rgba(255,255,255,0.1); --text:#e8eaf0; --gold:#f5c842; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        
        .header-info { width: 100%; max-width: 900px; display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--gold); font-weight: 500; font-size: 0.9rem; }
        .card { width: 100%; max-width: 900px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        h2, h3 { color: var(--gold); margin-bottom: 1rem; }
        input, textarea { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: inherit; margin-bottom: 10px; font-size: 1rem; }
        button { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; margin-right: 5px; margin-top: 5px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button.sec { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        
        #loginArea { display: flex; flex-direction: column; align-items: center; justify-align: center; height: 80vh; }
        #mainApp { display: none; width: 100%; max-width: 900px; }
        
        .status { padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; display: none; }
        .status.show { display: block; }
        .status-err { background: rgba(255, 71, 71, 0.1); color: #ff4747; border: 1px solid #ff4747; }
        .status-ok { background: rgba(71, 255, 126, 0.1); color: #47ff7e; border: 1px solid #47ff7e; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .overlay.show { display: flex; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #debugLogOutput { background: #000; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; max-height: 300px; overflow-y: auto; display: none; margin-top: 10px; border: 1px solid #333; }
        .editable-section { margin-top: 1.5rem; }
        .editable-section label { display: block; margin-bottom: 6px; color: var(--gold); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 600px) { body { padding: 1rem; } .header-info { flex-direction: column; gap: 5px; } }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="card" style="text-align: center;">
        <h2>Acesso Restrito</h2>
        <input type="password" id="senhaInput" placeholder="Digite a senha...">
        <button onclick="verificarSenha()">Entrar</button>
    </div>
</div>

<div id="mainApp">
    <div class="header-info">
        <span id="txtData"></span>
        <span id="txtRelogio"></span>
    </div>

    <div class="card">
        <h3>1. Configurações</h3>
        <input type="password" id="apiKeyInput" placeholder="Sua Gemini API Key">
        <button onclick="salvarKey()">Salvar Chave</button>
        <button class="sec" onclick="document.getElementById('debugLogOutput').style.display='block'">📋 Mostrar Debug</button>
        <pre id="debugLogOutput"></pre>
    </div>

    <div class="card">
        <h3>2. Nova Anamnese</h3>
        <textarea id="anamneseInput" rows="6" placeholder="Cole aqui os dados brutos da reunião..."></textarea>
        <button onclick="gerarIPS()">✨ Processar com IA</button>
        <button class="sec" onclick="document.getElementById('anamneseInput').value=''">Limpar</button>
        <div id="statusMsg" class="status"></div>
    </div>

    <div id="resultArea" style="display: none;">
        <div class="card">
            <h3>3. Revisão do IPS</h3>
            <div id="editaveisContainer"></div>
            <canvas id="graficoPatrimonio" style="margin: 20px 0; background: #1c2333; border-radius: 8px; border: 1px solid #333;"></canvas>
            <button onclick="exportarDOCX()" style="width: 100%; padding: 15px; font-size: 1.1rem;">📄 Exportar Documento Word</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div id="overlayText" style="color: white; font-weight: 500;">Processando...</div>
</div>

<script>
// --- CONFIGURAÇÕES E TEXTOS FIXOS ---
const SENHA_CORRETA = "pleno2024"; 
const TEXTO_INTRODUCAO = "Fundada em 2019, a Pleno Gestão de Investimentos nasceu para suprir a demanda por uma gestão patrimonial especializada no Nordeste. Com uma equipe de alta formação acadêmica e certificações de elite, consolidamos um modelo diferenciado que foca em um único propósito: cuidar do seu patrimônio para que você possa viver uma vida plena.\n\nNossa metodologia integra gestão e planejamento em um processo contínuo de análise, seleção e monitoramento de ativos. Tudo começa com um planejamento financeiro que entrega uma visão 360° da sua realidade, partindo de um diagnóstico detalhado sobre ativos, passivos e eficiência fiscal...";
const TEXTO_FIXO_4 = "4. Análise, Seleção e Monitoramento de Ativos\n\nO processo de gestão de investimentos inicia-se pela integração do planejamento financeiro do cliente com uma rigorosa análise macroeconômica. Fundamentamos essa etapa no monitoramento de indicadores globais e domésticos — como PIB, inflação, juros e balança comercial — abrangendo as economias do Brasil, EUA, União Europeia, China e Japão...";
const TEXTO_FIXO_5 = "5. Política de Investimento\n\nO portfólio será gerido seguindo os limites de concentração por classe de ativos e perfis de risco estabelecidos para a estratégia do cliente, garantindo diversificação e proteção patrimonial.";

let ultimoJson = null;
let chartInstance = null;
let DEBUG_LOGS = [];

// --- UTILITÁRIOS ---
function debug(msg, obj = null) {
    const entry = `[${new Date().toLocaleTimeString()}] ${msg} ${obj ? JSON.stringify(obj) : ''}`;
    DEBUG_LOGS.push(entry);
    const out = document.getElementById('debugLogOutput');
    out.textContent = DEBUG_LOGS.join('\n');
    out.scrollTop = out.scrollHeight;
    console.log(entry);
}

function atualizarRelogio() {
    const agora = new Date();
    document.getElementById('txtData').textContent = agora.toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    document.getElementById('txtRelogio').textContent = agora.toLocaleTimeString('pt-BR');
}
setInterval(atualizarRelogio, 1000);

function verificarSenha() {
    const input = document.getElementById('senhaInput').value;
    if (input === SENHA_CORRETA) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        atualizarRelogio();
    } else {
        alert("Senha incorreta!");
    }
}

function salvarKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (key) { localStorage.setItem('gemini_key', key); alert("Chave salva com sucesso!"); }
}

window.onload = () => { 
    const k = localStorage.getItem('gemini_key'); 
    if(k) document.getElementById('apiKeyInput').value = k; 
};

// --- LÓGICA IA ---
async function gerarIPS() {
    const anamnese = document.getElementById('anamneseInput').value.trim();
    const key = localStorage.getItem('gemini_key');
    
    if(!anamnese) return alert("Cole a anamnese primeiro.");
    if(!key) return alert("Configure a API Key.");

    document.getElementById('overlay').classList.add('show');
    debug("Iniciando processamento IA...");

    const prompt = `Você é um assessor de investimentos sênior da Pleno Gestão. 
    Analise a anamnese abaixo e preencha os tópicos 1, 2 e 3 do IPS.
    IMPORTANTE: Os tópicos devem ter no mínimo 3 parágrafos explicativos cada um.
    
    Retorne APENAS um JSON puro (sem markdown) no seguinte formato:
    {
      "nome": "Nome do Cliente",
      "t1": "Texto longo para Tópico 1 (Sobre o Cliente)",
      "t2": "Texto longo para Tópico 2 (Avaliações)",
      "t3": "Texto longo para Tópico 3 (Recomendações)",
      "patr": 500000,
      "aport": 5000,
      "anos": 25
    }
    
    ANAMNESE: ${anamnese}`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();
        if(data.error) throw new Error(data.error.message);

        let rawText = data.candidates[0].content.parts[0].text;
        debug("Resposta bruta recebida", rawText.substring(0, 100));

        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error("JSON não encontrado na resposta");

        ultimoJson = JSON.parse(jsonMatch[0]);
        
        document.getElementById('editaveisContainer').innerHTML = `
            <div class="editable-section"><label>Nome do Cliente</label><input id="valNome" value="${ultimoJson.nome}"></div>
            <div class="editable-section"><label>1. Sobre o Cliente</label><textarea id="valT1" rows="8">${ultimoJson.t1}</textarea></div>
            <div class="editable-section"><label>2. Avaliações</label><textarea id="valT2" rows="8">${ultimoJson.t2}</textarea></div>
            <div class="editable-section"><label>3. Recomendações Estratégicas</label><textarea id="valT3" rows="8">${ultimoJson.t3}</textarea></div>
        `;

        criarGrafico(ultimoJson.patr, ultimoJson.aport, ultimoJson.anos);
        document.getElementById('resultArea').style.display = 'block';
        debug("Sucesso no parse do JSON");

    } catch (e) {
        debug("ERRO IA", e.message);
        alert("Erro na IA: " + e.message);
    } finally {
        document.getElementById('overlay').classList.remove('show');
    }
}

function criarGrafico(p, a, anos) {
    const ctx = document.getElementById('graficoPatrimonio').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    
    let labels = [];
    let dados = [];
    let curr = p;
    for(let i=0; i<=anos; i++) {
        labels.push("Ano " + i);
        dados.push(Math.round(curr));
        curr = (curr + (a * 12)) * 1.08; // 8% juros simples simulado
    }

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Evolução Patrimonial (R$)', data: dados, borderColor: '#f5c842', backgroundColor: 'rgba(245,200,66,0.1)', fill: true, tension: 0.3 }]
        },
        options: { plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#aaa' } }, x: { ticks: { color: '#aaa' } } } }
    });
}

// --- EXPORTAÇÃO DOCX ROBUSTA ---
async function exportarDOCX() {
    debug("Iniciando exportação DOCX...");
    document.getElementById('overlay').classList.add('show');
    document.getElementById('overlayText').textContent = "Gerando Word...";

    try {
        const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType, HeadingLevel } = docx;

        // Capturar Imagem do Gráfico
        const canvas = document.getElementById('graficoPatrimonio');
        const imgBase64 = canvas.toDataURL('image/png');
        const imgBuffer = await fetch(imgBase64).then(r => r.arrayBuffer());

        const splitToParagraphs = (text) => {
            return text.split('\n').filter(l => l.trim() !== "").map(line => new Paragraph({
                children: [new TextRun({ text: line.trim(), size: 24 })],
                spacing: { after: 200 }
            }));
        };

        const doc = new Document({
            sections: [{
                properties: {},
                children: [
                    new Paragraph({ text: "POLÍTICA DE INVESTIMENTO (IPS)", heading: HeadingLevel.HEADING_1, alignment: AlignmentType.CENTER }),
                    new Paragraph({ text: document.getElementById('valNome').value, bold: true, alignment: AlignmentType.CENTER, spacing: { after: 400 } }),

                    new Paragraph({ text: "Introdução", heading: HeadingLevel.HEADING_2 }),
                    ...splitToParagraphs(TEXTO_INTRODUCAO),

                    new Paragraph({ text: "1. Sobre o Cliente", heading: HeadingLevel.HEADING_2 }),
                    ...splitToParagraphs(document.getElementById('valT1').value),

                    new Paragraph({ text: "2. Avaliações", heading: HeadingLevel.HEADING_2 }),
                    ...splitToParagraphs(document.getElementById('valT2').value),

                    new Paragraph({
                        children: [ new ImageRun({ data: imgBuffer, transformation: { width: 550, height: 280 } }) ],
                        alignment: AlignmentType.CENTER,
                        spacing: { before: 200, after: 200 }
                    }),

                    new Paragraph({ text: "3. Recomendações Estratégicas", heading: HeadingLevel.HEADING_2 }),
                    ...splitToParagraphs(document.getElementById('valT3').value),

                    new Paragraph({ text: "4. Análise e Monitoramento", heading: HeadingLevel.HEADING_2 }),
                    ...splitToParagraphs(TEXTO_FIXO_4),

                    new Paragraph({ text: "5. Política de Investimento", heading: HeadingLevel.HEADING_2 }),
                    ...splitToParagraphs(TEXTO_FIXO_5)
                ]
            }]
        });

        const blob = await Packer.toBlob(doc);
        saveAs(blob, `IPS_${document.getElementById('valNome').value.replace(/\s+/g,'_')}.docx`);
        debug("Exportação concluída com sucesso.");

    } catch (e) {
        debug("ERRO EXPORTAÇÃO", e.stack);
        alert("Falha ao exportar: " + e.message);
    } finally {
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('overlayText').textContent = "Processando...";
    }
}
</script>

</body>
</html>
