<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de IPS · Pleno Gestão de Investimentos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<style>
/* (mantive seu CSS original — omitido aqui por brevidade no snippet) */
/* Cole o CSS igual ao original aqui */
</style>
</head>
<body>
<!-- (mantive o HTML original das seções, inputs, botões e canvas) -->
<div class="overlay" id="overlay"><div class="spin"></div><div class="spin-text" id="overlayText">Processando...</div></div>

<header class="header">
  <div class="header-logo"><div class="dot">IPS</div>Gerador de IPS · Pleno Gestão de Investimentos</div>
  <div class="header-right"><div class="header-date" id="hDate"></div><button class="theme-toggle" id="themeToggle">🌙</button></div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">🔑 API Gemini</div>
    <div class="api-row">
      <div class="api-input-wrap"><input type="password" id="apiKeyInput" class="api-input" placeholder="Cole sua chave AIza..."><button class="api-eye" id="apiEye">👁️</button></div>
      <button class="btn btn-gold" id="btnSalvarKey">💾 Salvar chave</button>
      <a href="https://aistudio.google.com/app/apikey" target="_blank" class="btn-key">🔑 Gerar chave gratuita ↗</a>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="card">
    <div class="card-title">📝 Anamnese do Cliente</div>
    <textarea id="anamneseInput" rows="8" placeholder="Cole aqui o texto da reunião com o cliente..."></textarea>
    <div class="button-group">
      <button class="btn btn-gold" id="btnGerarIPS">✨ Gerar IPS com IA</button>
      <button class="btn btn-ghost" id="btnLimpar">🗑️ Limpar</button>
    </div>
    <div id="statusMsg" class="status"></div>
  </div>

  <div id="resultArea" style="display:none;">
    <div class="card">
      <div class="card-title">✏️ Edite o conteúdo gerado</div>
      <div id="editaveisContainer"></div>
      <canvas id="graficoPatrimonio" style="max-height: 300px; margin: 1rem 0;"></canvas>
      <button class="btn btn-gold" id="btnExportarDOCX">📄 Exportar para DOCX</button>
    </div>
  </div>
</main>

<footer class="footer">IA treinada com o modelo Pleno · Dados 100% privados · Exporta DOCX profissional</footer>

<script>
/* CONSTANTES FIXAS (mantive seu TEXTO_FIXO_ITEM4 e TABELA_POLITICA) */
const TEXTO_FIXO_ITEM4 = `# Análise, Seleção e Monitoramento de Ativos

O processo de gestão de investimentos inicia-se ... (mantive seu texto completo aqui)`;
const TABELA_POLITICA = `# Política de Investimento

| Produto | Mínimo | Máximo |
|---------|--------|--------|
... (mantive sua tabela completa aqui)`;

function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function setStatus(msg, tipo) { const el = document.getElementById('statusMsg'); el.innerHTML = msg; el.className = `status show status-${tipo}`; setTimeout(() => el.classList.remove('show'), 6000); }
function setOverlay(show, txt) { document.getElementById('overlay').classList.toggle('show', show); if(txt) document.getElementById('overlayText').textContent = txt; }

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function safeString(value, defaultValue = '') {
  if (value === null || value === undefined) return defaultValue;
  return String(value);
}

document.getElementById('btnSalvarKey').onclick = () => { const val = document.getElementById('apiKeyInput').value.trim(); if(val) localStorage.setItem('gemini_api_key', val); updateApiStatus(); };
document.getElementById('apiEye').onclick = () => { const inp = document.getElementById('apiKeyInput'); inp.type = inp.type === 'password' ? 'text' : 'password'; };

function updateApiStatus() {
  const key = getApiKey();
  const el = document.getElementById('apiStatus');
  if(key && key.startsWith('AIza')) {
    el.textContent = '✅ Chave salva';
    el.className = 'api-status valid';
    document.getElementById('apiKeyInput').value = key;
  } else if (key) {
    el.textContent = '⚠️ Chave salva (não parece começar com "AIza")';
    el.className = 'api-status';
    document.getElementById('apiKeyInput').value = key;
  } else {
    el.textContent = '⚠️ Nenhuma chave válida. Clique em "Gerar chave gratuita"';
    el.className = 'api-status';
  }
}
updateApiStatus();

let ultimoJson = null, chart = null;

/* Função utilitária para extrair um JSON balanceado do texto gerado pela IA.
   Procura o primeiro `{` e localizar o `}` correspondente contabilizando chaves. */
function extractJsonFromText(text) {
  if (!text || typeof text !== 'string') return null;
  const start = text.indexOf('{');
  if (start === -1) return null;
  let depth = 0;
  for (let i = start; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') {
      depth--;
      if (depth === 0) {
        const candidate = text.slice(start, i + 1);
        try {
          return JSON.parse(candidate);
        } catch (e) {
          // parsing failed for this slice — continue (mas dificil de recuperar)
          return null;
        }
      }
    }
  }
  return null;
}

/* Função para tentar localizar texto principal da resposta, suportando vários formatos */
function extractTextFromApiResponse(data) {
  // Várias APIs retornam conteúdo em caminhos diferentes — tentamos com segurança
  try {
    if (!data) return null;
    // caso mais comum usado antes
    if (data.candidates && data.candidates.length && data.candidates[0].content) {
      // content pode ser array de parts ou texto direto
      const content = data.candidates[0].content;
      if (Array.isArray(content)) {
        // juntar partes que tenham .text
        return content.map(c => c.text || (c.parts && c.parts.map(p => p.text).join('') )).join('\n');
      }
      return (content.parts && content.parts.map(p => p.text).join('')) || content.text || String(content);
    }
    // novo formato: output -> [ { content: [ { type: "output_text", text: "..." } ] } ]
    if (data.output && Array.isArray(data.output) && data.output.length) {
      const out = data.output[0];
      if (out.content && Array.isArray(out.content)) {
        const found = out.content.find(c => c.text || c.type === 'output_text');
        if (found) return found.text || (found.parts && found.parts.map(p => p.text).join('')) || null;
      }
    }
    // fallback: se a própria resposta é um texto bruto
    if (typeof data === 'string') return data;
    // tentar buscar em candidates[*].content[*].parts[*].text
    if (data.candidates) {
      for (const cand of data.candidates) {
        if (cand.content && Array.isArray(cand.content)) {
          for (const ct of cand.content) {
            if (ct.parts && Array.isArray(ct.parts)) return ct.parts.map(p => p.text || '').join('');
          }
        }
      }
    }
    // último recurso: serializar e retornar
    return JSON.stringify(data);
  } catch (err) {
    return null;
  }
}

document.getElementById('btnLimpar').onclick = () => {
  document.getElementById('anamneseInput').value = '';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('statusMsg').classList.remove('show');
  if(chart) { chart.destroy(); chart = null; }
  ultimoJson = null;
  setStatus('🧹 Pronto para novo cliente', 'ok');
};

document.getElementById('btnGerarIPS').onclick = async () => {
  const anamnese = document.getElementById('anamneseInput').value.trim();
  const apiKey = getApiKey();
  if(!anamnese) { setStatus('❌ Cole a anamnese do cliente', 'err'); return; }
  if(!apiKey) { setStatus('❌ Configure uma chave API (localStorage)', 'err'); return; }
  setOverlay(true, 'IA analisando a anamnese...');
  try {
    const prompt = `Você é um planejador financeiro sênior da Pleno Gestão de Investimentos.

ATENÇÃO: Você DEVE gerar o IPS seguindo EXATAMENTE a estrutura de TÓPICOS E SUBTÓPICOS abaixo. NÃO resuma, NÃO omita seções. Cada tópico deve ser detalhado com pelo menos 3 parágrafos.

ESTRUTURA OBRIGATÓRIA (copie exatamente estes cabeçalhos):

# Sobre o Cliente

## Família & Pessoal
[Detalhe: idade, estado civil, filhos, cidade onde mora, formação, estilo de vida]

## Negócios / Profissão
[Detalhe: profissão, tempo de atuação, especialidade, vínculos empregatícios ou autônomo, planos de carreira]

## Fontes de Renda
[Detalhe: renda mensal total, composição da renda, previsibilidade, estabilidade]

## Investimentos Atuais
[Detalhe: patrimônio financeiro atual, alocação por classe de ativo, rentabilidade histórica aproximada, instituições onde investe]

## Estilo de Vida & Custo de Vida
[Detalhe: custo de vida mensal, principais despesas, padrão de vida, dependentes econômicos]

## Objetivos Financeiros
[Detalhe: objetivos de curto, médio e longo prazo; prazo para cada objetivo; prioridade; sonhos específicos]

# Avaliações

## Patrimônio e Alocação Atual
[Detalhe: valor do patrimônio, distribuição percentual por ativo, análise qualitativa da alocação]

## Capacidade de Aporte
[Detalhe: renda menos despesas = capacidade de aporte mensal, potencial de aumento futuro]

## Projeção de Crescimento Patrimonial
[Detalhe: Considerando aporte mensal de X, prazo de Y anos, rentabilidade bruta de Z% a.a. e inflação de W% a.a., o patrimônio real projetado é de R$...]

# Recomendações Estratégicas

## Gestão de Projetos de Vida
[Detalhe: alinhamento dos objetivos com o planejamento financeiro, estratégias para cada objetivo]

## Construção de Renda Passiva
[Detalhe: estratégias para gerar renda passiva compatível com os objetivos do cliente]

## Alocação Estratégica Sugerida
[Detalhe: sugestão de alocação por classe de ativo com percentuais, justificativa baseada no perfil e objetivos]

## Próximos Passos
[Detalhe: ações imediatas, de curto e médio prazo para implementação das recomendações]

Agora, com base na anamnese abaixo, gere um IPS COMPLETO seguindo ESTRITAMENTE a estrutura acima. Cada subtópico deve ser RICO em detalhes, com pelo menos 3 linhas. NÃO resuma.

ANAMNESE:
${anamnese}

Após gerar os textos, retorne UM JSON com os seguintes campos:
{
  "nome_cliente": "Nome completo",
  "item1_sobre_cliente": "texto completo da seção # Sobre o Cliente com todos os subtópicos",
  "item2_avaliacoes": "texto completo da seção # Avaliações com todos os subtópicos",
  "item3_recomendacoes": "texto completo da seção # Recomendações Estratégicas com todos os subtópicos",
  "patrimonio": 0,
  "renda_mensal": 0,
  "aporte_mensal": 0,
  "periodo_anos": 0,
  "retorno_bruto": 0,
  "inflacao": 0
}`;

    const resposta = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.3, maxOutputTokens: 8192 } })
    });

    // leitura segura da resposta:
    let data;
    try {
      data = await resposta.json();
    } catch (e) {
      // se não for JSON, recuperar como texto
      const txt = await resposta.text();
      throw new Error('Resposta da API não é JSON: ' + txt.slice(0, 500));
    }

    console.log('🔍 Resposta completa:', data);

    if (data.error) {
      // se houver erro explícito da API (ex: autenticação), mostramos mensagem coerente
      throw new Error(data.error.message || JSON.stringify(data.error));
    }

    // extrair texto principal em vários formatos possíveis
    const textoBruto = extractTextFromApiResponse(data);
    if (!textoBruto) throw new Error('Resposta da API sem texto reconhecível.');

    console.log('🔍 Texto bruto extraído:', textoBruto.slice(0,1000));

    // tentar extrair JSON balanceado do texto
    let parsed = extractJsonFromText(textoBruto);
    if (!parsed) {
      // última tentativa: se o texto inteiro parecer ser JSON (sem chaves balanceadas), tentar parse direto
      try { parsed = JSON.parse(textoBruto); } catch (e) { /* continua */ }
    }
    if (!parsed) {
      throw new Error('JSON não encontrado na saída da IA. Peça para a IA retornar apenas o JSON ou verifique o prompt.');
    }

    ultimoJson = parsed;
    console.log('🔍 JSON:', ultimoJson);

    // Valores padrão
    ultimoJson.nome_cliente = ultimoJson.nome_cliente || 'Cliente';
    ultimoJson.item1_sobre_cliente = ultimoJson.item1_sobre_cliente || '### Família & Pessoal\nInformações não disponíveis.\n\n### Negócios\nInformações não disponíveis.\n\n### Fontes de Renda\nInformações não disponíveis.\n\n### Investimentos Atuais\nInformações não disponíveis.\n\n### Estilo de Vida\nInformações não disponíveis.\n\n### Objetivos\nInformações não disponíveis.';
    ultimoJson.item2_avaliacoes = ultimoJson.item2_avaliacoes || '### Patrimônio\nInformações não disponíveis.\n\n### Capacidade de Aporte\nInformações não disponíveis.\n\n### Projeção\nInformações não disponíveis.';
    ultimoJson.item3_recomendacoes = ultimoJson.item3_recomendacoes || '### Gestão de Projetos\nInformações não disponíveis.\n\n### Renda Passiva\nInformações não disponíveis.\n\n### Alocação\nInformações não disponíveis.\n\n### Próximos Passos\nInformações não disponíveis.';
    ultimoJson.patrimonio = Number(ultimoJson.patrimonio) || 0;
    ultimoJson.renda_mensal = Number(ultimoJson.renda_mensal) || 0;
    ultimoJson.aporte_mensal = Number(ultimoJson.aporte_mensal) || 5000;
    ultimoJson.periodo_anos = parseInt(ultimoJson.periodo_anos) || 30;
    ultimoJson.retorno_bruto = Number(ultimoJson.retorno_bruto) || 9.5;
    ultimoJson.inflacao = Number(ultimoJson.inflacao) || 4.5;

    document.getElementById('editaveisContainer').innerHTML = `
      <div class="editable-section"><label>📌 Nome do Cliente</label><input id="editNome" value="${escapeHtml(safeString(ultimoJson.nome_cliente))}"></div>
      <div class="editable-section"><label>👤 Sobre o Cliente (tópico a tópico)</label><textarea id="editItem1" rows="20">${escapeHtml(safeString(ultimoJson.item1_sobre_cliente))}</textarea></div>
      <div class="editable-section"><label>📊 Avaliações (tópico a tópico)</label><textarea id="editItem2" rows="16">${escapeHtml(safeString(ultimoJson.item2_avaliacoes))}</textarea></div>
      <div class="editable-section"><label>🎯 Recomendações Estratégicas (tópico a tópico)</label><textarea id="editItem3" rows="20">${escapeHtml(safeString(ultimoJson.item3_recomendacoes))}</textarea></div>
    `;

    // Gráfico (projeção com aporte anualizado)
    const aporte = parseFloat(ultimoJson.aporte_mensal) || 5000;
    const anos = parseInt(ultimoJson.periodo_anos) || 30;
    const retorno = (parseFloat(ultimoJson.retorno_bruto) || 9.5) / 100;
    const inflacao = (parseFloat(ultimoJson.inflacao) || 4.5) / 100;
    const txReal = (1+retorno)/(1+inflacao)-1;
    let saldo = Number(ultimoJson.patrimonio) || 0;
    const labels = [], dados = [];
    for(let i=0; i<=anos; i++) {
      labels.push(i);
      if(i===0) dados.push(Math.round(saldo));
      else { saldo = (saldo + aporte*12) * (1+txReal); dados.push(Math.round(saldo)); }
    }
    const ctx = document.getElementById('graficoPatrimonio').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Patrimônio Projetado (R$)', data: dados, borderColor: '#f5c842', tension: 0.3, fill: false, borderWidth: 3 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `R$ ${ctx.raw.toLocaleString('pt-BR')}` } } } }
    });

    document.getElementById('resultArea').style.display = 'block';
    setStatus('✅ IPS gerado com estrutura tópico a tópico!', 'ok');
  } catch (error) {
    console.error('❌ Erro:', error);
    setStatus(`❌ ${error.message}`, 'err');
  } finally {
    setOverlay(false);
  }
};

document.getElementById('btnExportarDOCX').onclick = async () => {
  if(!ultimoJson) { setStatus('❌ Nenhum IPS gerado', 'err'); return; }
  setOverlay(true, 'Gerando DOCX...');
  try {
    const nomeRaw = document.getElementById('editNome')?.value || ultimoJson.nome_cliente;
    // sanitizar nome para filename
    const nome = nomeRaw.replace(/[^\w\s\-]/g,'').trim().replace(/\s+/g,'_') || 'Cliente';
    const dataAtual = new Date().toLocaleDateString('pt-BR');
    const canvas = document.getElementById('graficoPatrimonio');

    // converter canvas para blob -> arrayBuffer -> Uint8Array para docx
    const dataUrl = canvas.toDataURL('image/png');
    const blob = await (await fetch(dataUrl)).blob();
    const arrayBuffer = await blob.arrayBuffer();
    const imageBytes = new Uint8Array(arrayBuffer);

    const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType } = docx;

    const doc = new Document({
      sections: [{
        properties: { page: { margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } },
        children: [
          new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "PLANO INICIAL", bold: true, size: 44 })] }),
          new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: nomeRaw, bold: true, size: 32 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: "# Introdução", bold: true, size: 32 })] }),
          new Paragraph({ children: [new TextRun({ text: "Fundada em 2019, a Pleno Gestão de Investimentos nasceu para suprir a demanda por uma gestão patrimonial especializada no Nordeste. Com uma equipe de alta formação acadêmica e certificações de elite, consolidamos um modelo diferenciado que foca em um único propósito: cuidar do seu patrimônio para que você possa viver uma vida plena.", size: 24 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: "# Sobre o Cliente", bold: true, size: 32 })] }),
          new Paragraph({ children: [new TextRun({ text: document.getElementById('editItem1')?.value || '', size: 24 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: "# Avaliações", bold: true, size: 32 })] }),
          new Paragraph({ children: [new TextRun({ text: document.getElementById('editItem2')?.value || '', size: 24 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new ImageRun({ data: imageBytes, transformation: { width: 500, height: 300 } })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: "# Recomendações Estratégicas", bold: true, size: 32 })] }),
          new Paragraph({ children: [new TextRun({ text: document.getElementById('editItem3')?.value || '', size: 24 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: TEXTO_FIXO_ITEM4, size: 24 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: TABELA_POLITICA, size: 22 })] }),
          new Paragraph({ children: [] }),
          new Paragraph({ children: [new TextRun({ text: `João Pessoa, ${dataAtual}`, size: 24 })] })
        ]
      }]
    });

    const packed = await Packer.toBlob(doc);
    saveAs(packed, `IPS_${nome}.docx`);
    setStatus('✅ DOCX gerado!', 'ok');
  } catch (err) {
    console.error(err);
    setStatus(`❌ Erro DOCX: ${err.message}`, 'err');
  } finally {
    setOverlay(false);
  }
};

document.getElementById('themeToggle').onclick = () => {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
};
if(localStorage.getItem('theme') === 'light') document.getElementById('themeToggle').click();
function atualizarRelogio() { document.getElementById('hDate').textContent = new Date().toLocaleString('pt-BR'); }
atualizarRelogio(); setInterval(atualizarRelogio, 1000);
</script>
</body>
</html>
