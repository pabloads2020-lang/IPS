<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de IPS · Pleno Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas Essenciais -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

    <style>
        :root { --bg:#0e1117; --card:#161b25; --input:#1c2333; --border:rgba(255,255,255,0.1); --text:#e8eaf0; --gold:#f5c842; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        
        .header-info { width: 100%; max-width: 900px; display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--gold); font-weight: 500; font-size: 0.9rem; }
        .card { width: 100%; max-width: 900px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        h2, h3 { color: var(--gold); margin-bottom: 1rem; }
        input, textarea { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: inherit; margin-bottom: 10px; font-size: 1rem; }
        button { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; margin-right: 5px; margin-top: 5px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        
        #loginArea { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; width: 100%; }
        #mainApp { display: none; width: 100%; max-width: 900px; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .overlay.show { display: flex; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .editable-section { margin-top: 1.5rem; }
        .editable-section label { display: block; margin-bottom: 6px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 600px) { body { padding: 1rem; } }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="card" style="text-align: center; max-width: 400px;">
        <h2>Acesso Restrito</h2>
        <input type="password" id="senhaInput" placeholder="Senha da Pleno...">
        <button onclick="verificarSenha()" style="width: 100%;">Entrar</button>
    </div>
</div>

<div id="mainApp">
    <div class="header-info">
        <span id="txtData"></span>
        <span id="txtRelogio"></span>
    </div>

    <div class="card">
        <h3>1. Configuração</h3>
        <input type="password" id="apiKeyInput" placeholder="Sua Gemini API Key">
        <button onclick="salvarKey()">Salvar Chave</button>
    </div>

    <div class="card">
        <h3>2. Nova Anamnese (Input IA)</h3>
        <textarea id="anamneseInput" rows="8" placeholder="Cole aqui os dados brutos, notas de reunião ou áudios transcritos do cliente..."></textarea>
        <button onclick="gerarIPS()">✨ Gerar IPS Personalizado</button>
    </div>

    <div id="resultArea" style="display: none;">
        <div class="card">
            <h3>3. Revisão do IPS Gerado</h3>
            <div id="editaveisContainer"></div>
            <canvas id="graficoPatrimonio" style="margin: 20px 0; background: #1c2333; border-radius: 8px; border: 1px solid #333;"></canvas>
            <button onclick="exportarDOCX()" style="width: 100%; padding: 15px; font-size: 1.1rem;">📄 Exportar Documento Word (.docx)</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div id="overlayText" style="color: white; font-weight: 500;">A IA está redigindo seu IPS...</div>
</div>

<script>
// Senha de Acesso[cite: 1]
const SENHA_CORRETA = "pleno2024";

// Itens Fixos do IPS[cite: 1, 2]
const TEXTO_INTRODUCAO = "Fundada em 2019, a Pleno Gestão de Investimentos nasceu para suprir a demanda por uma gestão patrimonial especializada no Nordeste. Com uma equipe de alta formação acadêmica e certificações de elite, consolidamos um modelo diferenciado que foca em um único propósito: cuidar do seu patrimônio para que você possa viver uma vida plena.\n\nNossa metodologia integra gestão e planejamento em um processo contínuo de análise, seleção e monitoramento de ativos.";
const TEXTO_FIXO_4 = "O processo de gestão de investimentos inicia-se pela integração do planejamento financeiro do cliente com uma rigorosa análise macroeconômica. Fundamentamos essa etapa no monitoramento de indicadores globais e domésticos — como PIB, inflação, juros e balança comercial — abrangendo as economias do Brasil, EUA, União Europeia, China e Japão.";
const TEXTO_FIXO_5 = "O portfólio será gerido seguindo os limites de concentração por classe de ativos e perfis de risco estabelecidos para a estratégia do cliente, garantindo diversificação e proteção patrimonial.";

let chartInstance = null;

function verificarSenha() {
    if (document.getElementById('senhaInput').value === SENHA_CORRETA) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        iniciarRelogio();
    } else { alert("Senha incorreta!"); }
}

function iniciarRelogio() {
    setInterval(() => {
        const agora = new Date();
        document.getElementById('txtData').textContent = agora.toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        document.getElementById('txtRelogio').textContent = agora.toLocaleTimeString('pt-BR');
    }, 1000);
}

function salvarKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (key) { localStorage.setItem('gemini_key', key); alert("Chave salva!"); }
}

window.onload = () => { 
    const k = localStorage.getItem('gemini_key'); 
    if(k) document.getElementById('apiKeyInput').value = k; 
};

async function gerarIPS() {
    const anamnese = document.getElementById('anamneseInput').value.trim();
    const key = localStorage.getItem('gemini_key');
    if(!anamnese || !key) return alert("Por favor, insira a anamnese e configure sua API Key.");

    document.getElementById('overlay').classList.add('show');

    const prompt = `Você é um consultor sênior da Pleno Gestão. Interprete os dados da anamnese e redija um IPS profissional.
    
    REGRAS DE REDAÇÃO:
    - Use um tom sofisticado, porém acessível[cite: 2].
    - Na seção 'sobre', inclua subtemas: Família & Pessoal, Negócios, Fontes de Renda, Investimentos, Estilo de Vida e Objetivos[cite: 2].
    - Na seção 'avaliacoes', analise: Patrimônio, Alocação e Renda[cite: 2].
    
    RETORNE APENAS JSON:
    {
      "nome": "NOME DO CLIENTE",
      "sobre": "Texto completo da seção 1",
      "avaliacoes": "Texto completo da seção 2",
      "recomendacoes": "Texto completo da seção 3",
      "grafico": {"p_inicial": 50000, "aporte": 5000, "anos": 25}
    }
    
    DADOS: ${anamnese}`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        const data = await response.json();
        
        if (!data.candidates) throw new Error("A IA não retornou dados. Verifique sua chave ou o conteúdo inserido.");

        const rawText = data.candidates[0].content.parts[0].text;
        const res = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]);
        
        document.getElementById('editaveisContainer').innerHTML = `
            <div class="editable-section"><label>Nome do Cliente</label><input id="valNome" value="${res.nome}"></div>
            <div class="editable-section"><label>1. Sobre o Cliente</label><textarea id="valSobre" rows="10">${res.sobre}</textarea></div>
            <div class="editable-section"><label>2. Avaliações</label><textarea id="valAval" rows="8">${res.avaliacoes}</textarea></div>
            <div class="editable-section"><label>3. Recomendações Estratégicas</label><textarea id="valRec" rows="8">${res.recomendacoes}</textarea></div>
        `;
        
        desenharGrafico(res.grafico.p_inicial, res.grafico.aporte, res.grafico.anos);
        document.getElementById('resultArea').style.display = 'block';
    } catch (e) { alert("Erro ao processar: " + e.message); }
    finally { document.getElementById('overlay').classList.remove('show'); }
}

function desenharGrafico(p, a, anos) {
    const ctx = document.getElementById('graficoPatrimonio').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    let labels = []; let valores = []; let total = p;
    for(let i=0; i<=anos; i++) {
        labels.push("Ano " + i);
        valores.push(Math.round(total));
        total = (total * 1.09) + (a * 12);
    }
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Evolução Patrimonial (R$)', data: valores, borderColor: '#f5c842', backgroundColor: 'rgba(245,200,66,0.1)', fill: true, tension: 0.3 }]
        },
        options: { plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#aaa' } }, x: { ticks: { color: '#aaa' } } } }
    });
}

async function exportarDOCX() {
    const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType, HeadingLevel } = window.docx;
    const canvas = document.getElementById('graficoPatrimonio');
    const imgBuffer = await (await fetch(canvas.toDataURL('image/png'))).arrayBuffer();

    const formatarTexto = (txt) => txt.split('\n').filter(l => l.trim() !== "").map(linha => new Paragraph({
        children: [new TextRun({ text: linha.trim(), size: 24 })],
        spacing: { before: 120, after: 120 },
        alignment: AlignmentType.JUSTIFIED
    }));

    const doc = new Document({
        sections: [{
            children: [
                new Paragraph({ text: "POLÍTICA DE INVESTIMENTO (IPS)", heading: HeadingLevel.HEADING_1, alignment: AlignmentType.CENTER }),
                new Paragraph({ text: document.getElementById('valNome').value.toUpperCase(), bold: true, alignment: AlignmentType.CENTER, spacing: { after: 400 } }),
                
                new Paragraph({ text: "Introdução", heading: HeadingLevel.HEADING_2 }),
                ...formatarTexto(TEXTO_INTRODUCAO),

                new Paragraph({ text: "1. Sobre o Cliente", heading: HeadingLevel.HEADING_2 }),
                ...formatarTexto(document.getElementById('valSobre').value),

                new Paragraph({ text: "2. Avaliações", heading: HeadingLevel.HEADING_2 }),
                ...formatarTexto(document.getElementById('valAval').value),

                new Paragraph({
                    children: [ new ImageRun({ data: imgBuffer, transformation: { width: 550, height: 280 } }) ],
                    alignment: AlignmentType.CENTER, spacing: { before: 400, after: 400 }
                }),

                new Paragraph({ text: "3. Recomendações Estratégicas", heading: HeadingLevel.HEADING_2 }),
                ...formatarTexto(document.getElementById('valRec').value),

                new Paragraph({ text: "4. Análise e Monitoramento", heading: HeadingLevel.HEADING_2 }),
                ...formatarTexto(TEXTO_FIXO_4),

                new Paragraph({ text: "5. Política de Investimento", heading: HeadingLevel.HEADING_2 }),
                ...formatarTexto(TEXTO_FIXO_5)
            ]
        }]
    });

    const blob = await Packer.toBlob(doc);
    saveAs(blob, `IPS_Pleno_${document.getElementById('valNome').value.replace(/\s+/g,'_')}.docx`);
}
</script>
</body>
</html>
