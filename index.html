<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Gerador · Pleno</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<style>
  :root { --bg:#0e1117; --card:#161b25; --input:#1c2333; --border:rgba(255,255,255,0.1); --text:#e8eaf0; --gold:#f5c842; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
  input, textarea { width: 100%; background: var(--input); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-family: inherit; }
  button { background: var(--gold); color: #000; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  .editable-section { margin-bottom: 1rem; }
  .editable-section label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--gold); }
  #resultArea { display: none; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; flex-direction: column; }
  .overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spinner"></div><div>Processando...</div></div>

<!-- Logs -->
<button id="btnShowLogs">📋 Mostrar Logs de Depuração</button>
<pre id="debugLogOutput" style="display:none; background:#111; color:#eee; padding:1rem; margin-top:1rem; white-space:pre-wrap;"></pre>

<div class="card">
  <h3>🔑 API Key</h3>
  <input type="password" id="apiKeyInput" placeholder="Cole sua chave AIza...">
  <button onclick="salvarChave()">Salvar Chave</button>
  <div id="statusKey"></div>
</div>

<div class="card">
  <h3>📝 Anamnese do Cliente</h3>
  <textarea id="anamneseInput" rows="8" placeholder="Cole aqui o texto da reunião..."></textarea>
  <button onclick="gerarIPS()">✨ Gerar IPS</button>
  <button onclick="limpar()">🗑️ Limpar</button>
  <button id="btnTestDocx">🧪 Testar DOCX (sem IA)</button>
  <div id="statusMsg"></div>
</div>

<div id="resultArea">
  <div class="card">
    <h3>✏️ Conteúdo Gerado</h3>
    <div id="editaveisContainer"></div>
    <canvas id="graficoPatrimonio" style="max-height: 300px; margin: 1rem 0;"></canvas>
    <button onclick="exportarDOCX()">📄 Exportar para DOCX</button>
  </div>
</div>

<script>
// Logs globais
window.DEBUG_LOGS = [];
function debugLog(type, message, data = null) {
  const ts = new Date().toISOString();
  const logEntry = `[${ts}] [${type}] ${message}${data ? '\n→ ' + JSON.stringify(data, null, 2) : ''}`;
  window.DEBUG_LOGS.push(logEntry);
  console.log(`[${type}]`, message, data || '');
}
document.getElementById('btnShowLogs').onclick = () => {
  const output = document.getElementById('debugLogOutput');
  output.style.display = output.style.display === 'none' ? 'block' : 'none';
  output.textContent = window.DEBUG_LOGS.join('\n\n') || 'Nenhum log registrado.';
};

// Textos fixos
const TEXTO_INTRODUCAO = `Fundada em 2019, a Pleno Gestão de Investimentos nasceu para suprir a demanda por uma gestão patrimonial especializada no Nordeste. Com uma equipe de alta formação acadêmica e certificações de elite, consolidamos um modelo diferenciado que foca em um único propósito: cuidar do seu patrimônio para que você possa viver uma vida plena.\n\nNossa metodologia integra gestão e planejamento em um processo contínuo de análise, seleção e monitoramento de ativos. Tudo começa com um planejamento financeiro que entrega uma visão 360° da sua realidade, partindo de um diagnóstico detalhado sobre ativos, passivos e eficiência fiscal. Esse cuidado se estende ao entendimento do seu perfil humano, alinhando cada estratégia aos seus objetivos e às aspirações da sua família. Por fim, a execução racional garante que todas as decisões sejam transparentes e baseadas estritamente em dados, mantendo o foco nos resultados e eliminando o peso das emoções.`;

const TEXTO_FIXO_ITEM4 = `4. Análise, Seleção e Monitoramento de Ativos\n\nO processo de gestão de investimentos inicia-se pela integração do planejamento financeiro do cliente com uma rigorosa análise macroeconômica. Fundamentamos essa etapa no monitoramento de indicadores globais e domésticos — como PIB, inflação, juros e balança comercial — abrangendo as economias do Brasil, EUA, União Europeia, China e Japão. A partir desses dados e das expectativas do mercado, projetamos cenários que incorporam riscos e impactos estimados, servindo como base estratégica para a estruturação de todas as carteiras.\n\nComplementarmente, realizamos análises microeconômicas e setoriais específicas para o mercado brasileiro, estabelecendo cenários-base que orientam a tomada de decisão. A alocação de ativos é estritamente guiada pela Política de Investimento (PI), respeitando sempre os limites de concentração e a necessidade de liquidez de cada classe. Esse fluxo assegura que a composição do portfólio esteja alinhada tanto às condições de mercado quanto às diretrizes de segurança e objetivos de cada investidor executando o seguinte processo:\n\nTítulos Públicos:\nAnalisamos o duration e eventuais distorções entre o valor de mercado e as projeções do cenário-base, buscando oportunidades de reprecificação em títulos prefixados e indexados. Já para a parcela pós-fixada, a alocação é dimensionada estrategicamente para atender aos objetivos de liquidez da carteira.\n\nTítulos Privados:\nValidamos o rating do emissor através de uma análise própria baseada nos 5 C’s do crédito e em testes de estresse para cenários adversos. A seleção final prioriza a melhor relação risco-retorno, considerando duration, liquidez e eficiência tributária, sempre em estrita conformidade com a Política de Investimento (PI).\n\nCotas de Fundos:\nA seleção de fundos integra análises qualitativas — focadas na experiência da equipe e no histórico da gestora sob estresse — e quantitativas, que utilizam os índices de Sharpe e Treynor para avaliar a eficiência. Além disso, monitoramos a correlação com o benchmark e a volatilidade das cotas para garantir o alinhamento estratégico.\n\nAções:\nA seleção de ações combina análise fundamentalista — avaliando indicadores operacionais (como o ROE), múltiplos de mercado e forças competitivas — com análise técnica para a definição do timing de entrada. A exposição final é rigorosamente calibrada conforme os limites de concentração estabelecidos na Política de Investimento (PI).\n\nImportante: Reconhecendo a incerteza inerente aos mercados, adotamos uma postura de humildade epistemológica, estruturando proteções para cenários em que as projeções base não se materializem.`;

const TABELA_POLITICA = `5. Política de Investimento\n\n| Produto | Mínimo | Máximo |\n|---------|--------|--------|\n| Títulos Financeiros: CDB / Compromissada / LCI / LCA / LF sênior | 0,0% | 40,0% |\n| Emissor investment grade com prazo de até 3 anos | 0,0% | 10,0% |\n| Emissor non investment grade com prazo até 3 anos | 0,0% | 10,0% |\n| Emissor investment grade, acima de 3 anos | 0,0% | 10,0% |\n| Emissor non investment grade, acima de 3 anos | 0,0% | 10,0% |\n| LF subordinada e subordinada híbrida | 0,0% | 40,0% |\n| Títulos Públicos | 2,0% | 100,0% |\n| LFT | 2,0% | 90,0% |\n| Títulos não financeiros: Debêntures / CRI / CRA etc | 0,0% | 40,0% |\n| Ações e Commodities | 10,0% | 80,0% |\n| Ações | 10,0% | 50,0% |\n| Ouro | 0,0% | 30,0% |\n| Derivativos Listados em Bolsa | 0,0% | 10,0% |\n| COE | 0,0% | 20,0% |\n| Fundos Estruturados | 0,0% | 50,0% |\n| FIP | 0,0% | 20,0% |\n| FII de incorporação | 0,0% | 20,0% |\n| Outros FIIs | 0,0% | 20,0% |`;

let ultimoJson = null, chart = null;

function salvarChave() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) {
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('statusKey').textContent = '✅ Chave salva!';
    debugLog('UI', 'Chave salva no localStorage');
  }
}
function getApiKey() {
  return localStorage.getItem('gemini_api_key') || '';
}
function setStatus(msg, ok = true) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.style.color = ok ? 'limegreen' : 'tomato';
}

function preencherEdicaoComJson(json) {
  document.getElementById('editaveisContainer').innerHTML = `
    <div class="editable-section"><label>Nome do Cliente</label><input id="editNome" value="${json.nome_cliente || ''}"></div>
    <div class="editable-section"><label>#1. Sobre o Cliente</label><textarea id="editItem1" rows="12">${json.item1 || ''}</textarea></div>
    <div class="editable-section"><label>#2. Avaliações</label><textarea id="editItem2" rows="10">${json.item2 || ''}</textarea></div>
    <div class="editable-section"><label>#3. Recomendações</label><textarea id="editItem3" rows="12">${json.item3 || ''}</textarea></div>
  `;
}

async function gerarIPS() {
  const anamnese = document.getElementById('anamneseInput').value.trim();
  const key = getApiKey();
  if (!anamnese) return setStatus('❌ Informe a anamnese.', false);
  if (!key) return setStatus('❌ Configure a chave API.', false);

  document.getElementById('overlay').classList.add('show');
  debugLog('API', 'Iniciando chamada à API...', { anamneseLength: anamnese.length });

  try {
    const prompt = `Você é um especialista da Pleno Gestão. A partir da anamnese, gere um JSON contendo os campos abaixo. Retorne SOMENTE o JSON, sem comentários ou explicações.

{
  "nome_cliente": "Nome Completo",
  "item1": "Texto do #1. Sobre o Cliente\\n\\n## Família & Pessoal\\n3+ linhas\\n\\n## Negócios / Profissão\\n3+ linhas\\n\\n## Fontes de Renda\\n3+ linhas\\n\\n## Investimentos Atuais\\n3+ linhas\\n\\n## Estilo de Vida & Custo de Vida\\n3+ linhas\\n\\n## Objetivos Financeiros\\n3+ linhas",
  "item2": "Texto do #2. Avaliações\\n\\n## Patrimônio e Alocação Atual\\n3+ linhas\\n\\n## Capacidade de Aporte\\n3+ linhas\\n\\n## Projeção de Crescimento Patrimonial\\n3+ linhas",
  "item3": "Texto do #3. Recomendações Estratégicas\\n\\n## Gestão de Projetos de Vida\\n3+ linhas\\n\\n## Construção de Renda Passiva\\n3+ linhas\\n\\n## Alocação Estratégica Sugerida\\n3+ linhas\\n\\n## Próximos Passos\\n3+ linhas",
  "patrimonio": 100000,
  "aporte": 5000,
  "anos": 30
}

ANAMNESE:
${anamnese}`;

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });

    const data = await res.json();
    debugLog('API-RESPONSE', 'Resposta recebida', { status: res.status, hasError: !!data.error, hasCandidates: !!data.candidates });

    if (data.error) throw new Error(data.error.message || 'Erro desconhecido da API');

    const texto = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const match = texto.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("JSON não encontrado na resposta.");
    ultimoJson = JSON.parse(match[0]);
    preencherEdicaoComJson(ultimoJson);
    renderizarGrafico(ultimoJson.patrimonio, ultimoJson.aporte, ultimoJson.anos);
    document.getElementById('resultArea').style.display = 'block';
    setStatus('✅ IPS gerado com sucesso!');
    debugLog('API-SUCCESS', 'JSON extraído e interface atualizada', { nome: ultimoJson.nome_cliente });
  } catch (e) {
    debugLog('API-ERROR', 'Erro na chamada à API', { message: e.message, stack: e.stack });
    setStatus(`❌ Erro: ${e.message}`, false);
  } finally {
    document.getElementById('overlay').classList.remove('show');
  }
}

function renderizarGrafico(p, a, anos) {
  const ctx = document.getElementById('graficoPatrimonio').getContext('2d');
  if (chart) chart.destroy();
  const labels = Array.from({ length: anos + 1 }, (_, i) => i);
  let saldo = p;
  const data = [saldo];
  for (let i = 1; i <= anos; i++) {
    saldo = (saldo + a * 12) * 1.05; // Simulação de 5% real/ano
    data.push(Math.round(saldo));
  }
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ label: 'Patrimônio Projetado (R$)', data, borderColor: '#f5c842', tension: 0.2 }] },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
