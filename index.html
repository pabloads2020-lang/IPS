<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPS Pleno - CORRIGIDO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: gold; padding: 10px 15px; border: none; cursor: pointer; margin: 5px; }
        .card { border-left: 5px solid gold; padding: 10px; margin: 20px 0; background: #f9f9f9; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Gerador IPS - Pleno (Modo Garantido)</h2>
    <input type="password" id="apiKey" placeholder="Sua Chave Gemini (AIza...)" style="width: 70%; padding: 8px;">
    <button id="saveKey">Salvar Chave</button>
    <hr>
    <textarea id="anamnese" rows="8" placeholder="Cole a anamnese do cliente aqui..."></textarea>
    <button id="gerar">1. GERAR IPS (IA)</button>
    <button id="exportar">2. EXPORTAR DOCX</button>
    <div id="status"></div>
    <div id="resultado" class="hidden">
        <div class="card"><label>Nome:</label><input id="nome_cliente" style="width:100%"></div>
        <div class="card"><label>Sobre o Cliente (Detalhado):</label><textarea id="item1" rows="12"></textarea></div>
        <div class="card"><label>Avaliações (Detalhado):</label><textarea id="item2" rows="12"></textarea></div>
        <div class="card"><label>Recomendações (Detalhado):</label><textarea id="item3" rows="12"></textarea></div>
        <canvas id="grafico" width="400" height="200"></canvas>
    </div>
</div>
<script>
    // Config
    const saveKeyBtn = document.getElementById('saveKey');
    const apiKeyInput = document.getElementById('apiKey');
    const gerarBtn = document.getElementById('gerar');
    const exportBtn = document.getElementById('exportar');
    const anamneseArea = document.getElementById('anamnese');
    const statusDiv = document.getElementById('status');
    const resultadoDiv = document.getElementById('resultado');
    let chartInstance = null;

    saveKeyBtn.onclick = () => {
        const key = apiKeyInput.value.trim();
        if (key) localStorage.setItem('gemini_key', key);
        statusDiv.innerText = 'Chave salva!';
    };
    if (localStorage.getItem('gemini_key')) apiKeyInput.value = localStorage.getItem('gemini_key');

    gerarBtn.onclick = async () => {
        const key = localStorage.getItem('gemini_key');
        const anamnese = anamneseArea.value;
        if (!key) { statusDiv.innerText = 'Erro: Insira a chave API'; return; }
        if (!anamnese) { statusDiv.innerText = 'Erro: Cole a anamnese'; return; }
        statusDiv.innerText = 'Gerando... (pode levar 15 segundos)';
        
        // PROMPT EXECUTIVO: Força a resposta em JSON PURO
        const prompt = `Você é um planejador financeiro. Gere um plano IPS completíssimo.
        Retorne APENAS UM JSON válido, sem texto antes ou depois.
        O JSON deve ter os campos: nome, item1, item2, item3, aporte, anos, retorno, inflacao, patrimonio_atual.
        
        - item1: "Sobre o Cliente" (MUITO DETALHADO, use subtópicos: Familia/Profissão/Renda/Investimentos/Objetivos. Mínimo 500 caracteres)
        - item2: "Avaliações" (Análise patrimonial, capacidade de aporte. Mínimo 300 caracteres)
        - item3: "Recomendações Estratégicas" (Sugestões de alocação, prazos, próximos passos. Mínimo 400 caracteres)
        
        Baseado na anamnese: ${anamnese}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } })
            });
            const data = await response.json();
            let rawText = data.candidates[0].content.parts[0].text;
            // Força a extração do JSON
            let jsonMatch = rawText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('IA não retornou JSON');
            let dados = JSON.parse(jsonMatch[0]);
            
            // Fallback manual caso a IA tenha vindo vazia
            document.getElementById('nome_cliente').value = dados.nome || "Cliente Genérico";
            document.getElementById('item1').value = dados.item1 || "Conteúdo não gerado corretamente pela IA. Verifique a chave.";
            document.getElementById('item2').value = dados.item2 || "Conteúdo não gerado.";
            document.getElementById('item3').value = dados.item3 || "Conteúdo não gerado.";
            
            // Gráfico
            let aporte = parseFloat(dados.aporte) || 5000;
            let anos = parseInt(dados.anos) || 30;
            let retorno = (parseFloat(dados.retorno) / 100) || 0.095;
            let inflacao = (parseFloat(dados.inflacao) / 100) || 0.045;
            let txReal = (1+retorno)/(1+inflacao)-1;
            let saldo = parseFloat(dados.patrimonio_atual) || 0;
            let labels = [], valores = [];
            for(let i=0; i<=anos; i++) {
                labels.push(i);
                if(i>0) saldo = (saldo + (aporte*12)) * (1+txReal);
                valores.push(Math.round(saldo));
            }
            const ctx = document.getElementById('grafico').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Patrimônio Projetado', data: valores, borderColor: 'gold' }] } });
            
            resultadoDiv.classList.remove('hidden');
            statusDiv.innerText = 'Gerado com sucesso! Edite os textos se quiser e clique em Exportar.';
        } catch (err) {
            statusDiv.innerText = `Erro na Geração: ${err.message}. Verifique o console (F12) e a chave.`;
            console.error(err);
        }
    };

    exportBtn.onclick = async () => {
        if (!document.getElementById('nome_cliente').value) { alert("Gere o IPS primeiro"); return; }
        statusDiv.innerText = 'Gerando DOCX...';
        try {
            const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;
            const blobImg = await (await fetch(document.getElementById('grafico').toDataURL())).blob();
            const imageBuffer = await blobImg.arrayBuffer();
            
            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "PLANO DE INVESTIMENTOS - PLENO", bold: true, size: 40 })] }),
                        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: document.getElementById('nome_cliente').value, bold: true, size: 32 })] }),
                        new Paragraph({ children: [] }),
                        new Paragraph({ children: [new TextRun({ text: "1. SOBRE O CLIENTE", bold: true, size: 28 })] }),
                        new Paragraph({ children: [new TextRun({ text: document.getElementById('item1').value, size: 24 })] }),
                        new Paragraph({ children: [] }),
                        new Paragraph({ children: [new TextRun({ text: "2. AVALIAÇÕES", bold: true, size: 28 })] }),
                        new Paragraph({ children: [new TextRun({ text: document.getElementById('item2').value, size: 24 })] }),
                        new Paragraph({ children: [] }),
                        new Paragraph({ children: [new TextRun({ text: "3. RECOMENDAÇÕES ESTRATÉGICAS", bold: true, size: 28 })] }),
                        new Paragraph({ children: [new TextRun({ text: document.getElementById('item3').value, size: 24 })] }),
                        new Paragraph({ children: [] }),
                        new Paragraph({ children: [new TextRun({ text: "Projeção Patrimonial:", bold: true, size: 28 })] }),
                        new Paragraph({ children: [new ImageRun({ data: imageBuffer, transformation: { width: 500, height: 250 } })] })
                    ]
                }]
            });
            const blob = await Packer.toBlob(doc);
            saveAs(blob, `IPS_${document.getElementById('nome_cliente').value.replace(/ /g,'_')}.docx`);
            statusDiv.innerText = 'DOCX salvo com sucesso!';
        } catch(err) {
            statusDiv.innerText = `Erro Exportar: ${err.message}`;
            console.error(err);
        }
    };
</script>
</body>
</html>
