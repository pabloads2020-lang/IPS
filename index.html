<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de IPS · Pleno Gestão de Investimentos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
  --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.12);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --input-bg: #1c2333; --input-border: rgba(255,255,255,0.13);
  --overlay-bg: rgba(14,17,23,.88);
  --footer-border: rgba(255,255,255,0.07);
  --result-item-bg: #1c2333;
}
body.light {
  --bg: #f5f7fa; --bg2: #ffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --green: #27ae60; --green-bg: rgba(39,174,96,0.1);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.1);
  --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1);
  --header-bg: #ffff; --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffff; --card-border: rgba(0,0,0,0.08);
  --input-bg: #ffff; --input-border: #e2e8f0;
  --overlay-bg: rgba(255,255,255,.95);
  --footer-border: rgba(0,0,0,0.08);
  --result-item-bg: #f7fafc;
}
* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
body { font-family: 'DM Sans', 'Atkinson Hyperlegible', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 13px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.05); }

.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }

.api-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.api-input-wrap { position: relative; flex: 1; min-width: 220px; }
.api-input { width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: 8px; padding: 9px 40px 9px 14px; font-size: 14px; color: var(--text); font-family: monospace; outline: none; }
.api-input:focus { border-color: var(--gold); }
.api-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text3); background: none; border: none; }
.btn-key { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); text-decoration: none; }
.btn-key:hover { border-color: var(--gold); color: var(--gold); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.api-status { font-size: 12px; color: var(--text3); margin-top: 4px; }
.api-status.valid { color: var(--green); }

textarea { width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: 8px; padding: 12px; font-size: 14px; color: var(--text); font-family: 'DM Sans', monospace; resize: vertical; }
textarea:focus { border-color: var(--gold); outline: none; }

.button-group { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }

.status { display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
.status.show { display: flex; }
.status-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46,204,113,0.25); }
.status-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231,76,60,0.25); }

.editable-section { background: var(--result-item-bg); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; border-left: 3px solid var(--gold); }
.editable-section label { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
.editable-section textarea, .editable-section input { width: 100%; background: var(--input-bg); border: 1px solid var(--border2); border-radius: 6px; padding: 8px; font-size: 14px; color: var(--text); font-family: inherit; }

.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.overlay.show { display: flex; }
.spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

.footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem; border-top: 1px solid var(--footer-border); margin-top: 1rem; }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div class="spin-text" id="overlayText">Processando...</div></div>

<header class="header">
  <div class="header-logo"><div class="dot">IPS</div>Gerador de IPS · Pleno Gestão de Investimentos</div>
  <div class="header-right"><div class="header-date" id="hDate"></div><button class="theme-toggle" id="themeToggle">🌙</button></div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">🔑 API Gemini</div>
    <div class="api-row">
      <div class="api-input-wrap"><input type="password" id="apiKeyInput" class="api-input" placeholder="Cole sua chave AIza..."><button class="api-eye" id="apiEye">👁️</button></div>
      <button class="btn btn-gold" id="btnSalvarKey">💾 Salvar chave</button>
      <a href="https://aistudio.google.com/app/apikey" target="_blank" class="btn-key">🔑 Gerar chave gratuita ↗</a>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="card">
    <div class="card-title">📝 Anamnese do Cliente</div>
    <textarea id="anamneseInput" rows="8" placeholder="Cole aqui o texto da reunião com o cliente..."></textarea>
    <div class="button-group">
      <button class="btn btn-gold" id="btnGerarIPS">✨ Gerar IPS com IA</button>
      <button class="btn btn-ghost" id="btnLimpar">🗑️ Limpar</button>
    </div>
    <div id="statusMsg" class="status"></div>
  </div>

  <div id="resultArea" style="display:none;">
    <div class="card">
      <div class="card-title">✏️ Edite o conteúdo gerado</div>
      <div id="editaveisContainer"></div>
      <button class="btn btn-gold" id="btnExportarDOCX">📄 Exportar para DOCX</button>
    </div>
  </div>
</main>

<footer class="footer">IA treinada com o modelo Pleno · Dados 100% privados · Exporta DOCX profissional</footer>

<script>
const TEXTO_FIXO_ITEM4 = `ANÁLISE, SELEÇÃO E MONITORAMENTO DE ATIVOS

O processo de gestão de investimentos inicia-se pela integração do planejamento financeiro do cliente com uma rigorosa análise macroeconômica. Fundamentamos essa etapa no monitoramento de indicadores globais e domésticos — como PIB, inflação, juros e balança comercial — abrangendo as economias do Brasil, EUA, União Europeia, China e Japão. A partir desses dados e das expectativas do mercado, projetamos cenários que incorporam riscos e impactos estimados, servindo como base estratégica para a estruturação de todas as carteiras.

TÍTULOS PÚBLICOS:
Analisamos o duration e eventuais distorções entre o valor de mercado e as projeções do cenário-base, buscando oportunidades de reprecificação em títulos prefixados e indexados. Já para a parcela pós-fixada, a alocação é dimensionada estrategicamente para atender aos objetivos de liquidez da carteira.

TÍTULOS PRIVADOS:
Validamos o rating do emissor através de uma análise própria baseada nos 5 C's do crédito e em testes de estresse para cenários adversos. A seleção final prioriza a melhor relação risco-retorno, considerando duration, liquidez e eficiência tributária, sempre em estrita conformidade com a Política de Investimento.

COTAS DE FUNDOS:
A seleção de fundos integra análises qualitativas — focadas na experiência da equipe e no histórico da gestora sob estresse — e quantitativas, que utilizam os índices de Sharpe e Treynor para avaliar a eficiência.

AÇÕES:
A seleção de ações combina análise fundamentalista — avaliando indicadores operacionais (como o ROE), múltiplos de mercado e forças competitivas — com análise técnica para a definição do timing de entrada.

Importante: Reconhecendo a incerteza inerente aos mercados, adotamos uma postura de humildade epistemológica, estruturando proteções para cenários em que as projeções base não se materializem.`;

const TABELA_POLITICA = `POLÍTICA DE INVESTIMENTO

Produto                                        | Mínimo | Máximo
------------------------------------------------|--------|--------
Títulos Financeiros: CDB / Compromissada / LCI | 0,0%   | 40,0%
Emissor investment grade com prazo até 3 anos  | 0,0%   | 10,0%
Emissor non investment grade até 3 anos        | 0,0%   | 10,0%
Emissor investment grade acima de 3 anos       | 0,0%   | 10,0%
Emissor non investment grade acima de 3 anos   | 0,0%   | 10,0%
LF subordinada e subordinada híbrida           | 0,0%   | 40,0%
Títulos Públicos                               | 2,0%   | 100,0%
LFT                                            | 2,0%   | 90,0%
Debêntures / CRI / CRA                         | 0,0%   | 40,0%
Ações e Commodities                            | 10,0%  | 80,0%
Ações                                          | 10,0%  | 50,0%
Ouro                                           | 0,0%   | 30,0%
Derivativos Listados em Bolsa                  | 0,0%   | 10,0%
COE                                            | 0,0%   | 20,0%
Fundos Estruturados                            | 0,0%   | 20,0%
FIP                                            | 0,0%   | 20,0%
FII de incorporação                            | 0,0%   | 20,0%
Outros FIIs                                    | 0,0%   | 20,0%`;

function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function setStatus(msg, tipo) { const el = document.getElementById('statusMsg'); el.innerHTML = msg; el.className = `status show status-${tipo}`; setTimeout(() => el.classList.remove('show'), 6000); }
function setOverlay(show, txt) { 
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  if(show) {
    overlay.classList.add('show');
    if(txt && overlayText) overlayText.textContent = txt;
  } else {
    overlay.classList.remove('show');
  }
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function safeString(value, defaultValue = '') {
  if (value === null || value === undefined) return defaultValue;
  return String(value);
}

// API Key handlers
document.getElementById('btnSalvarKey').onclick = () => { 
  const val = document.getElementById('apiKeyInput').value.trim(); 
  if(val) localStorage.setItem('gemini_api_key', val); 
  updateApiStatus(); 
};

document.getElementById('apiEye').onclick = () => { 
  const inp = document.getElementById('apiKeyInput'); 
  inp.type = inp.type === 'password' ? 'text' : 'password'; 
};

function updateApiStatus() { 
  const key = getApiKey(); 
  const el = document.getElementById('apiStatus'); 
  if(key && key.startsWith('AIza')) { 
    el.textContent = '✅ Chave salva'; 
    el.className = 'api-status valid'; 
    document.getElementById('apiKeyInput').value = key; 
  } else { 
    el.textContent = '⚠️ Nenhuma chave'; 
    el.className = 'api-status'; 
  } 
}
updateApiStatus();

let ultimoJson = null;

// Limpar
document.getElementById('btnLimpar').onclick = () => {
  document.getElementById('anamneseInput').value = '';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('statusMsg').classList.remove('show');
  ultimoJson = null;
  setStatus('🧹 Pronto para novo cliente', 'ok');
};

// Gerar IPS
document.getElementById('btnGerarIPS').onclick = async () => {
  const anamnese = document.getElementById('anamneseInput').value.trim();
  const apiKey = getApiKey();
  
  if(!anamnese) { setStatus('❌ Cole a anamnese', 'err'); return; }
  if(!apiKey) { setStatus('❌ Configure a chave API', 'err'); return; }
  
  setOverlay(true, 'IA analisando...');
  
  try {
    const prompt = `Responda APENAS com um JSON válido. Use aspas duplas.

{
  "nome_cliente": "Nome do Cliente",
  "item1_sobre_cliente": "## Família & Pessoal\\n...\\n\\n## Negócios\\n...\\n\\n## Fontes de Renda\\n...\\n\\n## Investimentos Atuais\\n...\\n\\n## Estilo de Vida\\n...\\n\\n## Objetivos\\n...",
  "item2_avaliacoes": "## Patrimônio\\n...\\n\\n## Capacidade de Aporte\\n...\\n\\n## Projeção\\n...",
  "item3_recomendacoes": "## Gestão de Projetos\\n...\\n\\n## Renda Passiva\\n...\\n\\n## Alocação Estratégica\\n...\\n\\n## Próximos Passos\\n..."
}

Anamnese: ${anamnese}`;

    const resposta = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        contents: [{ parts: [{ text: prompt }] }], 
        generationConfig: { temperature: 0.3, maxOutputTokens: 4096 } 
      })
    });
    
    const data = await resposta.json();
    console.log('API Response:', data);
    
    if (data.error) throw new Error(data.error.message);
    if (!data.candidates || !data.candidates[0]) throw new Error('API não retornou conteúdo');
    
    let rawText = data.candidates[0].content.parts[0].text;
    console.log('Raw text:', rawText);
    
    let jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON não encontrado');
    
    ultimoJson = JSON.parse(jsonMatch[0]);
    
    ultimoJson.nome_cliente = ultimoJson.nome_cliente || 'Cliente';
    ultimoJson.item1_sobre_cliente = ultimoJson.item1_sobre_cliente || '## Família & Pessoal\nInformações não disponíveis.\n\n## Negócios\nInformações não disponíveis.\n\n## Fontes de Renda\nInformações não disponíveis.\n\n## Investimentos Atuais\nInformações não disponíveis.\n\n## Estilo de Vida\nInformações não disponíveis.\n\n## Objetivos\nInformações não disponíveis.';
    ultimoJson.item2_avaliacoes = ultimoJson.item2_avaliacoes || '## Patrimônio\nInformações não disponíveis.\n\n## Capacidade de Aporte\nInformações não disponíveis.\n\n## Projeção\nInformações não disponíveis.';
    ultimoJson.item3_recomendacoes = ultimoJson.item3_recomendacoes || '## Gestão de Projetos\nInformações não disponíveis.\n\n## Renda Passiva\nInformações não disponíveis.\n\n## Alocação\nInformações não disponíveis.\n\n## Próximos Passos\nInformações não disponíveis.';
    
    document.getElementById('editaveisContainer').innerHTML = `
      <div class="editable-section"><label>📌 Nome</label><input id="editNome" value="${escapeHtml(ultimoJson.nome_cliente)}"></div>
      <div class="editable-section"><label>👤 Sobre o Cliente</label><textarea id="editItem1" rows="20">${escapeHtml(ultimoJson.item1_sobre_cliente)}</textarea></div>
      <div class="editable-section"><label>📊 Avaliações</label><textarea id="editItem2" rows="16">${escapeHtml(ultimoJson.item2_avaliacoes)}</textarea></div>
      <div class="editable-section"><label>🎯 Recomendações</label><textarea id="editItem3" rows="20">${escapeHtml(ultimoJson.item3_recomendacoes)}</textarea></div>
    `;
    
    document.getElementById('resultArea').style.display = 'block';
    setStatus('✅ IPS gerado!', 'ok');
    
  } catch(error) {
    console.error('Erro:', error);
    setStatus(`❌ ${error.message}`, 'err');
  } finally {
    setOverlay(false);
  }
};

// EXPORTAR DOCX - VERSÃO SIMPLIFICADA
document.getElementById('btnExportarDOCX').onclick = async () => {
  if(!ultimoJson) { 
    setStatus('❌ Nenhum IPS gerado', 'err'); 
    return; 
  }
  
  setOverlay(true, 'Gerando DOCX...');
  
  try {
    // Verificar se a biblioteca docx está disponível
    if (typeof docx === 'undefined') {
      throw new Error('Biblioteca DOCX não carregou. Recarregue a página e tente novamente.');
    }
    
    const nome = document.getElementById('editNome')?.value || 'Cliente';
    const dataAtual = new Date().toLocaleDateString('pt-BR');
    
    const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;
    
    // Criar documento
    const doc = new Document({
      sections: [{
        properties: {
          page: {
            margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
          }
        },
        children: [
          // Título
          new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: "PLANO INICIAL", bold: true, size: 44 })]
          }),
          new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: nome.toUpperCase(), bold: true, size: 32 })]
          }),
          new Paragraph({ children: [] }),
          
          // Introdução
          new Paragraph({
            children: [new TextRun({ text: "INTRODUÇÃO", bold: true, size: 28 })]
          }),
          new Paragraph({
            children: [new TextRun({ 
              text: "Fundada em 2019, a Pleno Gestão de Investimentos nasceu para suprir a demanda por uma gestão patrimonial especializada no Nordeste. Com uma equipe de alta formação acadêmica e certificações de elite, consolidamos um modelo diferenciado que foca em um único propósito: cuidar do seu patrimônio para que você possa viver uma vida plena.", 
              size: 24 
            })]
          }),
          new Paragraph({ children: [] }),
          
          // Sobre o Cliente
          new Paragraph({
            children: [new TextRun({ text: "SOBRE O CLIENTE", bold: true, size: 28 })]
          }),
          new Paragraph({
            children: [new TextRun({ text: document.getElementById('editItem1')?.value || '', size: 24 })]
          }),
          new Paragraph({ children: [] }),
          
          // Avaliações
          new Paragraph({
            children: [new TextRun({ text: "AVALIAÇÕES", bold: true, size: 28 })]
          }),
          new Paragraph({
            children: [new TextRun({ text: document.getElementById('editItem2')?.value || '', size: 24 })]
          }),
          new Paragraph({ children: [] }),
          
          // Recomendações
          new Paragraph({
            children: [new TextRun({ text: "RECOMENDAÇÕES ESTRATÉGICAS", bold: true, size: 28 })]
          }),
          new Paragraph({
            children: [new TextRun({ text: document.getElementById('editItem3')?.value || '', size: 24 })]
          }),
          new Paragraph({ children: [] }),
          
          // Política de Investimento
          new Paragraph({
            children: [new TextRun({ text: TEXTO_FIXO_ITEM4, size: 24 })]
          }),
          new Paragraph({ children: [] }),
          new Paragraph({
            children: [new TextRun({ text: TABELA_POLITICA, size: 22 })]
          }),
          new Paragraph({ children: [] }),
          
          // Data
          new Paragraph({
            children: [new TextRun({ text: `João Pessoa, ${dataAtual}`, size: 24 })]
          })
        ]
      }]
    });
    
    // Gerar e baixar
    const blob = await Packer.toBlob(doc);
    saveAs(blob, `IPS_${nome.replace(/[^a-zA-Z0-9]/g, '_')}.docx`);
    setStatus('✅ DOCX exportado com sucesso!', 'ok');
    
  } catch(error) {
    console.error('Erro detalhado na exportação:', error);
    setStatus(`❌ Erro ao exportar: ${error.message}`, 'err');
  } finally {
    setOverlay(false);
  }
};

// Theme Toggle
document.getElementById('themeToggle').onclick = () => {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
};

// Carregar tema salvo
if(localStorage.getItem('theme') === 'light') {
  document.getElementById('themeToggle').click();
}

// Relógio
function atualizarRelogio() { 
  const now = new Date();
  const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('hDate').textContent = now.toLocaleString('pt-BR', options);
}
atualizarRelogio();
setInterval(atualizarRelogio, 1000);
</script>
